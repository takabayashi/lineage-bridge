<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Inter, system-ui, sans-serif; overflow: hidden; }

  #toolbar {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 10px; background: rgba(128,128,128,0.06);
    border-bottom: 1px solid rgba(128,128,128,0.18);
    font-size: 13px; user-select: none;
  }
  body.dark #toolbar { background: rgba(255,255,255,0.04); }
  .tb-btn {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px; border: 1px solid rgba(128,128,128,0.35); border-radius: 6px;
    background: transparent; cursor: pointer; font-size: 12px;
    color: inherit; transition: all 0.15s;
  }
  .tb-btn:hover { background: rgba(128,128,128,0.15); }
  .tb-btn.active { background: #1976D2; color: #fff; border-color: #1565C0; }
  .tb-sep { width: 1px; height: 20px; background: rgba(128,128,128,0.3); margin: 0 4px; }
  .tb-hint { margin-left: auto; color: #999; font-size: 11px; }

  #graph-wrapper { position: relative; width: 100%; }
  #graph-container {
    width: 100%;
    border: 1px solid rgba(128,128,128,0.2);
    border-radius: 8px;
  }
  body.dark #graph-container { border-color: rgba(255,255,255,0.10); }
  #select-overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    cursor: crosshair; display: none; z-index: 10;
  }
  #select-rect {
    position: absolute; border: 2px dashed #1976D2;
    background: rgba(25, 118, 210, 0.08); border-radius: 3px;
    display: none; pointer-events: none; z-index: 11;
  }
</style>
</head>
<body>

<div id="toolbar">
  <button class="tb-btn" id="btn-select" title="Shift+Drag to select region">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="18" height="18" rx="2" stroke-dasharray="4 2"/>
    </svg>
    Region Zoom
  </button>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-fit" title="Fit all nodes">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/>
    </svg>
    Fit All
  </button>
  <button class="tb-btn" id="btn-zin" title="Zoom in">+</button>
  <button class="tb-btn" id="btn-zout" title="Zoom out">&minus;</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-edge-labels" title="Toggle edge labels">Edge labels</button>
  <span class="tb-hint" id="hint-text">Click for details &middot; Double-click to focus &middot; Shift+drag for region</span>
</div>

<div id="graph-wrapper">
  <div id="graph-container"></div>
  <canvas id="select-overlay"></canvas>
  <div id="select-rect"></div>
</div>

<script>
// ── Streamlit Component API ──────────────────────────────────────────
// Minimal implementation of the Streamlit bi-directional component
// protocol without requiring streamlit-component-lib.js.

var Streamlit = {
  setComponentValue: function(value) {
    window.parent.postMessage({
      isStreamlitMessage: true,
      type: "streamlit:setComponentValue",
      dataType: "json",
      value: value
    }, "*");
  },
  setFrameHeight: function(height) {
    window.parent.postMessage({
      isStreamlitMessage: true,
      type: "streamlit:setFrameHeight",
      height: height
    }, "*");
  }
};

var network = null;
var lastClickedAt = 0;
var clickDebounce = null;
var DOUBLE_CLICK_MS = 250;
var edgeLabelsHidden = false;
var clickSeq = 0;  // monotonic counter so repeat clicks on the same node still rerun

// Listen for render events from Streamlit BEFORE signaling ready
window.addEventListener("message", function(event) {
  var data = event.data;
  if (!data || data.type !== "streamlit:render") return;
  var args = data.args;
  if (args) initGraph(args);
});

// Signal ready — Streamlit will then send a render event
window.parent.postMessage({
  isStreamlitMessage: true,
  type: "streamlit:componentReady",
  apiVersion: 1
}, "*");

function initGraph(args) {
  var graphData, configJson, graphHeight;

  try {
    graphData = JSON.parse(args.data || '{"nodes":[],"edges":[]}');
    configJson = JSON.parse(args.config || '{}');
    graphHeight = args.graph_height || 650;
  } catch(e) {
    console.error("Failed to parse graph data:", e);
    return;
  }

  var container = document.getElementById("graph-container");
  var wrapper = document.getElementById("graph-wrapper");
  container.style.height = graphHeight + "px";
  wrapper.style.height = graphHeight + "px";

  var overlay = document.getElementById("select-overlay");
  overlay.style.height = graphHeight + "px";

  Streamlit.setFrameHeight(graphHeight + 42);

  // ── Restore saved positions from sessionStorage ────────────────
  var storageKey = "lb_node_positions";
  if (configJson._clearPositions) {
    sessionStorage.removeItem(storageKey);
  }
  var savedRaw = sessionStorage.getItem(storageKey);
  var savedPositions = null;
  try { savedPositions = savedRaw ? JSON.parse(savedRaw) : null; } catch(e) {}

  // Convert HTML title strings to DOM elements for rich tooltips
  graphData.nodes.forEach(function(n) {
    if (n.title && n.title.charAt(0) === '<') {
      var el = document.createElement("div");
      el.innerHTML = n.title;
      n.title = el;
    }
    // Apply saved positions (override Python-computed layout)
    if (savedPositions && savedPositions[n.id]) {
      n.x = savedPositions[n.id].x;
      n.y = savedPositions[n.id].y;
    }
  });

  // Dark mode: walk up from container to body looking for a non-transparent
  // background, then derive luminance from it. Streamlit sets the iframe
  // background to match its theme regardless of OS prefers-color-scheme.
  var isDark = false;
  var el = container;
  while (el) {
    var bg = getComputedStyle(el).backgroundColor || "";
    var rgbaMatch = bg.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)(?:,\s*([\d.]+))?\)/);
    if (rgbaMatch) {
      var alpha = rgbaMatch[4] !== undefined ? parseFloat(rgbaMatch[4]) : 1;
      if (alpha > 0.5) {
        var lum = (parseInt(rgbaMatch[1]) * 299 + parseInt(rgbaMatch[2]) * 587 + parseInt(rgbaMatch[3]) * 114) / 1000;
        isDark = lum < 128;
        break;
      }
    }
    el = el.parentElement;
  }
  if (isDark) {
    document.body.classList.add("dark");
    graphData.nodes.forEach(function(n) {
      if (n.font) {
        n.font.color = "#ffffff";
        n.font.strokeColor = "#000000";
      }
    });
    graphData.edges.forEach(function(e) {
      if (e.font) {
        e.font.color = "#cccccc";
        e.font.strokeColor = "#000000";
      }
    });
  }

  // ── Search-match highlight ─────────────────────────────────────
  // Nodes flagged with _search_match get a thicker accent border so the
  // user can spot the actual search hit inside its neighborhood subgraph.
  var matchAccent = isDark ? "#FFD54F" : "#F57C00";
  graphData.nodes.forEach(function(n) {
    if (n._search_match) {
      n.borderWidth = 4;
      n.borderWidthSelected = 5;
      n.color = n.color || {};
      if (typeof n.color === "string") n.color = { background: n.color };
      n.color.border = matchAccent;
      n.color.highlight = n.color.highlight || {};
      n.color.highlight.border = matchAccent;
      // Visual chip on the label so it reads even at low zoom
      n.label = "★ " + (n.label || "");
    }
  });

  // ── Edge labels: keep state across renders (cached in sessionStorage) ──
  edgeLabelsHidden = sessionStorage.getItem("lb_edge_labels_hidden") === "1";
  if (edgeLabelsHidden) {
    graphData.edges.forEach(function(e) { e._origLabel = e.label; e.label = ""; });
  }

  var nodes = new vis.DataSet(graphData.nodes);
  var edges = new vis.DataSet(graphData.edges);

  var edgeConfig = configJson.edges || {};
  var edgeFontDefaults = isDark
    ? { size: 9, color: "#cccccc", strokeWidth: 2, strokeColor: "#000000", align: "top" }
    : { size: 9, color: "#888", strokeWidth: 2, strokeColor: "#fff", align: "top" };
  edgeConfig.font = edgeConfig.font || edgeFontDefaults;

  var options = {
    layout: configJson.layout || {},
    physics: configJson.physics || { enabled: false },
    interaction: {
      hover: true,
      tooltipDelay: 150,
      zoomView: true,
      dragView: true,
      dragNodes: true,
      navigationButtons: false,
      keyboard: { enabled: true }
    },
    edges: edgeConfig
  };

  if (network) {
    network.destroy();
  }
  network = new vis.Network(container, { nodes: nodes, edges: edges }, options);

  // Resize overlay after layout
  setTimeout(function() {
    overlay.width = wrapper.offsetWidth;
    overlay.height = graphHeight;
  }, 200);

  // ── Persist positions on drag end (browser-side only) ──────────
  network.on("dragEnd", function(params) {
    if (params.nodes.length > 0) {
      var positions = network.getPositions();
      sessionStorage.setItem(storageKey, JSON.stringify(positions));
    }
  });

  // ── Click vs. double-click discrimination ──────────────────────
  // Plain click selects (renders the detail panel). Double-click focuses
  // (sets focus_node so the graph zooms into that node's neighborhood).
  // We delay single-click delivery briefly so a follow-up click can be
  // recognized as part of a double-click and replace the action.
  network.on("click", function(params) {
    if (params.nodes.length === 0) return;
    var nodeId = params.nodes[0];
    if (clickDebounce) {
      clearTimeout(clickDebounce);
      clickDebounce = null;
    }
    clickDebounce = setTimeout(function() {
      clickDebounce = null;
      clickSeq += 1;
      Streamlit.setComponentValue({ action: "select", id: nodeId, seq: clickSeq });
    }, DOUBLE_CLICK_MS);
  });

  network.on("doubleClick", function(params) {
    if (params.nodes.length === 0) return;
    if (clickDebounce) { clearTimeout(clickDebounce); clickDebounce = null; }
    clickSeq += 1;
    Streamlit.setComponentValue({ action: "focus", id: params.nodes[0], seq: clickSeq });
  });

  // ── Toolbar buttons ────────────────────────────────────────────
  document.getElementById("btn-fit").onclick = function() {
    network.fit({ animation: { duration: 400, easingFunction: "easeInOutQuad" } });
  };
  document.getElementById("btn-zin").onclick = function() {
    network.moveTo({ scale: network.getScale() * 1.4, animation: { duration: 300 } });
  };
  document.getElementById("btn-zout").onclick = function() {
    network.moveTo({ scale: network.getScale() / 1.4, animation: { duration: 300 } });
  };

  var btnEdgeLabels = document.getElementById("btn-edge-labels");
  function refreshEdgeLabelsBtn() {
    btnEdgeLabels.classList.toggle("active", !edgeLabelsHidden);
    btnEdgeLabels.textContent = edgeLabelsHidden ? "Show edge labels" : "Edge labels";
  }
  refreshEdgeLabelsBtn();
  btnEdgeLabels.onclick = function() {
    edgeLabelsHidden = !edgeLabelsHidden;
    sessionStorage.setItem("lb_edge_labels_hidden", edgeLabelsHidden ? "1" : "0");
    var updates = [];
    edges.forEach(function(e) {
      var origLabel = e._origLabel != null ? e._origLabel : (edgeLabelsHidden ? e.label : e.label);
      if (edgeLabelsHidden) {
        updates.push({ id: e.id, _origLabel: origLabel, label: "" });
      } else {
        updates.push({ id: e.id, label: origLabel });
      }
    });
    edges.update(updates);
    refreshEdgeLabelsBtn();
  };

  // ── Region select mode ─────────────────────────────────────────
  var selectMode = false;
  var selectStart = null;
  var btnSelect = document.getElementById("btn-select");
  var rectEl = document.getElementById("select-rect");
  var hintText = document.getElementById("hint-text");

  function setSelectMode(on) {
    selectMode = on;
    overlay.style.display = on ? "block" : "none";
    btnSelect.classList.toggle("active", on);
    hintText.textContent = on
      ? "Drag to select a region, then release to zoom"
      : "Click for details · Double-click to focus · Shift+drag for region";
    if (!on) rectEl.style.display = "none";
  }

  btnSelect.onclick = function() { setSelectMode(!selectMode); };

  document.addEventListener("keydown", function(e) {
    if (e.key === "Shift" && !selectMode) {
      setSelectMode(true);
      overlay.dataset.shiftHeld = "1";
    }
    if (e.key === "Escape" && selectMode) {
      selectStart = null;
      setSelectMode(false);
    }
  });
  document.addEventListener("keyup", function(e) {
    if (e.key === "Shift" && overlay.dataset.shiftHeld === "1") {
      setSelectMode(false);
      overlay.dataset.shiftHeld = "0";
    }
  });

  overlay.addEventListener("mousedown", function(e) {
    if (!selectMode) return;
    var rect = overlay.getBoundingClientRect();
    selectStart = { x: e.clientX - rect.left, y: e.clientY - rect.top };
    rectEl.style.left = selectStart.x + "px";
    rectEl.style.top = (selectStart.y + 42) + "px";
    rectEl.style.width = "0px";
    rectEl.style.height = "0px";
    rectEl.style.display = "block";
  });

  overlay.addEventListener("mousemove", function(e) {
    if (!selectStart) return;
    var rect = overlay.getBoundingClientRect();
    var cx = e.clientX - rect.left;
    var cy = e.clientY - rect.top;
    rectEl.style.left = Math.min(selectStart.x, cx) + "px";
    rectEl.style.top = (Math.min(selectStart.y, cy) + 42) + "px";
    rectEl.style.width = Math.abs(cx - selectStart.x) + "px";
    rectEl.style.height = Math.abs(cy - selectStart.y) + "px";
  });

  overlay.addEventListener("mouseup", function(e) {
    if (!selectStart) return;
    var rect = overlay.getBoundingClientRect();
    var cx = e.clientX - rect.left;
    var cy = e.clientY - rect.top;
    var x1 = Math.min(selectStart.x, cx), y1 = Math.min(selectStart.y, cy);
    var x2 = Math.max(selectStart.x, cx), y2 = Math.max(selectStart.y, cy);
    selectStart = null;
    rectEl.style.display = "none";

    if ((x2 - x1) < 20 && (y2 - y1) < 20) {
      if (overlay.dataset.shiftHeld !== "1") setSelectMode(false);
      return;
    }

    var topLeft = network.DOMtoCanvas({ x: x1, y: y1 });
    var bottomRight = network.DOMtoCanvas({ x: x2, y: y2 });
    var positions = network.getPositions();
    var insideNodes = [];
    for (var nodeId in positions) {
      var pos = positions[nodeId];
      if (pos.x >= topLeft.x && pos.x <= bottomRight.x &&
          pos.y >= topLeft.y && pos.y <= bottomRight.y) {
        insideNodes.push(nodeId);
      }
    }
    if (insideNodes.length > 0) {
      network.fit({
        nodes: insideNodes,
        animation: { duration: 400, easingFunction: "easeInOutQuad" },
        minZoomLevel: 0.1, maxZoomLevel: 3.0
      });
    }
    if (overlay.dataset.shiftHeld !== "1") setSelectMode(false);
  });

  // Initial fit
  network.once("afterDrawing", function() {
    network.fit({ animation: false });
  });
}
</script>
</body>
</html>
