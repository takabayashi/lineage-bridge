services:
  extract:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    command: ["lineage-bridge-extract"]
    env_file: ../../.env
    environment:
      - LINEAGE_BRIDGE_EXTRACT_OUTPUT_PATH=/app/data/lineage_graph.json
    volumes:
      - ../../data:/app/data
    profiles:
      - extract
    healthcheck:
      test: ["CMD", "python", "-c", "import lineage_bridge"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  ui:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    ports:
      - "8501:8501"
    env_file: ../../.env
    environment:
      - LINEAGE_BRIDGE_EXTRACT_OUTPUT_PATH=/app/data/lineage_graph.json
    volumes:
      - ../../data:/app/data
    profiles:
      - ui
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  watch:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    command:
      - lineage-bridge-watch
      - --env
      - ${LINEAGE_BRIDGE_WATCH_ENV:-env-change-me}
      - --cooldown
      - "${LINEAGE_BRIDGE_WATCH_COOLDOWN:-30}"
    env_file: ../../.env
    volumes:
      - ../../data:/app/data
    profiles:
      - watch
    healthcheck:
      test: ["CMD", "python", "-c", "import lineage_bridge"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
