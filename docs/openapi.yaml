openapi: 3.1.0
info:
  title: LineageBridge API
  description: OpenLineage-compatible REST API that exposes Confluent Cloud stream
    lineage for integration with data catalogs (Databricks UC, AWS Glue, Google Data
    Lineage, and more).
  version: 0.3.0
paths:
  /api/v1/health:
    get:
      tags:
      - meta
      summary: Health
      operationId: health_api_v1_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Health Api V1 Health Get
  /api/v1/version:
    get:
      tags:
      - meta
      summary: Version
      operationId: version_api_v1_version_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Version Api V1 Version Get
  /api/v1/catalogs:
    get:
      tags:
      - meta
      summary: Catalogs
      description: List registered catalog providers.
      operationId: catalogs_api_v1_catalogs_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  additionalProperties:
                    type: string
                  type: object
                type: array
                title: Response Catalogs Api V1 Catalogs Get
  /api/v1/lineage/events:
    get:
      tags:
      - lineage
      summary: Query Events
      description: 'Query OpenLineage run events with optional filters.


        Namespace and job support glob patterns (e.g. `confluent://*`).'
      operationId: query_events_api_v1_lineage_events_get
      security:
      - APIKeyHeader: []
      parameters:
      - name: namespace
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Namespace
      - name: job
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Job
      - name: since
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Since
      - name: until
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Until
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 100
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RunEvent-Output'
                title: Response Query Events Api V1 Lineage Events Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - lineage
      summary: Ingest Events
      description: 'Ingest OpenLineage RunEvent(s) from external systems.


        Accepts a list of RunEvents and stores them for querying.

        Events are also merged into the graph store via events_to_graph.'
      operationId: ingest_events_api_v1_lineage_events_post
      security:
      - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/RunEvent-Input'
              title: Events
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Ingest Events Api V1 Lineage Events Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/lineage/events/{run_id}:
    get:
      tags:
      - lineage
      summary: Get Events By Run
      description: Get all events for a specific run ID.
      operationId: get_events_by_run_api_v1_lineage_events__run_id__get
      security:
      - APIKeyHeader: []
      parameters:
      - name: run_id
        in: path
        required: true
        schema:
          type: string
          title: Run Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RunEvent-Output'
                title: Response Get Events By Run Api V1 Lineage Events  Run Id  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/lineage/datasets:
    get:
      tags:
      - datasets
      summary: List Datasets
      description: List datasets. Supports glob patterns for namespace and name.
      operationId: list_datasets_api_v1_lineage_datasets_get
      security:
      - APIKeyHeader: []
      parameters:
      - name: namespace
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Namespace
      - name: name
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Dataset'
                title: Response List Datasets Api V1 Lineage Datasets Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/lineage/datasets/detail:
    get:
      tags:
      - datasets
      summary: Get Dataset
      description: Get a specific dataset by namespace and name (query params).
      operationId: get_dataset_api_v1_lineage_datasets_detail_get
      security:
      - APIKeyHeader: []
      parameters:
      - name: namespace
        in: query
        required: true
        schema:
          type: string
          title: Namespace
      - name: name
        in: query
        required: true
        schema:
          type: string
          title: Name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dataset'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/lineage/datasets/lineage:
    get:
      tags:
      - datasets
      summary: Get Dataset Lineage
      description: 'Traverse lineage for a dataset.


        Returns the chain of jobs and datasets connected to this dataset

        in the specified direction, up to the given depth.'
      operationId: get_dataset_lineage_api_v1_lineage_datasets_lineage_get
      security:
      - APIKeyHeader: []
      parameters:
      - name: namespace
        in: query
        required: true
        schema:
          type: string
          title: Namespace
      - name: name
        in: query
        required: true
        schema:
          type: string
          title: Name
      - name: direction
        in: query
        required: false
        schema:
          type: string
          pattern: ^(upstream|downstream|both)$
          default: upstream
          title: Direction
      - name: depth
        in: query
        required: false
        schema:
          type: integer
          maximum: 50
          minimum: 1
          default: 5
          title: Depth
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Get Dataset Lineage Api V1 Lineage Datasets Lineage
                  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/lineage/jobs:
    get:
      tags:
      - jobs
      summary: List Jobs
      description: List jobs. Supports glob patterns for namespace and name.
      operationId: list_jobs_api_v1_lineage_jobs_get
      security:
      - APIKeyHeader: []
      parameters:
      - name: namespace
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Namespace
      - name: name
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Job-Output'
                title: Response List Jobs Api V1 Lineage Jobs Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/lineage/jobs/detail:
    get:
      tags:
      - jobs
      summary: Get Job
      description: Get a job with its most recent inputs and outputs.
      operationId: get_job_api_v1_lineage_jobs_detail_get
      security:
      - APIKeyHeader: []
      parameters:
      - name: namespace
        in: query
        required: true
        schema:
          type: string
          title: Namespace
      - name: name
        in: query
        required: true
        schema:
          type: string
          title: Name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Get Job Api V1 Lineage Jobs Detail Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/graphs:
    get:
      tags:
      - graphs
      summary: List Graphs
      description: List all in-memory graphs.
      operationId: list_graphs_api_v1_graphs_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/GraphSummary'
                type: array
                title: Response List Graphs Api V1 Graphs Get
      security:
      - APIKeyHeader: []
    post:
      tags:
      - graphs
      summary: Create Graph
      description: Create a new empty graph.
      operationId: create_graph_api_v1_graphs_post
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Create Graph Api V1 Graphs Post
      security:
      - APIKeyHeader: []
  /api/v1/graphs/{graph_id}:
    get:
      tags:
      - graphs
      summary: Get Graph
      description: Get a full graph with nodes, edges, and stats.
      operationId: get_graph_api_v1_graphs__graph_id__get
      security:
      - APIKeyHeader: []
      parameters:
      - name: graph_id
        in: path
        required: true
        schema:
          type: string
          title: Graph Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Get Graph Api V1 Graphs  Graph Id  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - graphs
      summary: Delete Graph
      operationId: delete_graph_api_v1_graphs__graph_id__delete
      security:
      - APIKeyHeader: []
      parameters:
      - name: graph_id
        in: path
        required: true
        schema:
          type: string
          title: Graph Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
                title: Response Delete Graph Api V1 Graphs  Graph Id  Delete
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/graphs/{graph_id}/import:
    post:
      tags:
      - graphs
      summary: Import Graph
      description: Import nodes and edges from JSON into an existing graph.
      operationId: import_graph_api_v1_graphs__graph_id__import_post
      security:
      - APIKeyHeader: []
      parameters:
      - name: graph_id
        in: path
        required: true
        schema:
          type: string
          title: Graph Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              title: Data
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Import Graph Api V1 Graphs  Graph Id  Import Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/graphs/{graph_id}/export:
    get:
      tags:
      - graphs
      summary: Export Graph
      description: Export graph as native LineageGraph JSON.
      operationId: export_graph_api_v1_graphs__graph_id__export_get
      security:
      - APIKeyHeader: []
      parameters:
      - name: graph_id
        in: path
        required: true
        schema:
          type: string
          title: Graph Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Export Graph Api V1 Graphs  Graph Id  Export Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/graphs/confluent/view:
    get:
      tags:
      - graphs
      summary: Confluent View
      description: 'Confluent-only lineage view across all graphs.


        Returns OpenLineage events for Confluent-system nodes only,

        excluding catalog nodes (UC, Glue, Google).'
      operationId: confluent_view_api_v1_graphs_confluent_view_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Confluent View Api V1 Graphs Confluent View Get
      security:
      - APIKeyHeader: []
  /api/v1/graphs/enriched/view:
    get:
      tags:
      - graphs
      summary: Enriched View
      description: 'Full enriched lineage view across all graphs.


        Includes Confluent nodes plus all catalog nodes (UC, Glue, Google).

        Optionally filter by system types.'
      operationId: enriched_view_api_v1_graphs_enriched_view_get
      security:
      - APIKeyHeader: []
      parameters:
      - name: systems
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Comma-separated system filter (e.g. confluent,databricks)
          title: Systems
        description: Comma-separated system filter (e.g. confluent,databricks)
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Enriched View Api V1 Graphs Enriched View Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/graphs/{graph_id}/nodes:
    get:
      tags:
      - graphs
      summary: List Nodes
      description: List nodes with optional filters.
      operationId: list_nodes_api_v1_graphs__graph_id__nodes_get
      security:
      - APIKeyHeader: []
      parameters:
      - name: graph_id
        in: path
        required: true
        schema:
          type: string
          title: Graph Id
      - name: type
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/NodeType'
          - type: 'null'
          title: Type
      - name: system
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/SystemType'
          - type: 'null'
          title: System
      - name: env_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Env Id
      - name: search
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Search
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response List Nodes Api V1 Graphs  Graph Id  Nodes Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - graphs
      summary: Add Node
      operationId: add_node_api_v1_graphs__graph_id__nodes_post
      security:
      - APIKeyHeader: []
      parameters:
      - name: graph_id
        in: path
        required: true
        schema:
          type: string
          title: Graph Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LineageNode'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
                title: Response Add Node Api V1 Graphs  Graph Id  Nodes Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/graphs/{graph_id}/nodes/{node_id}:
    get:
      tags:
      - graphs
      summary: Get Node
      operationId: get_node_api_v1_graphs__graph_id__nodes__node_id__get
      security:
      - APIKeyHeader: []
      parameters:
      - name: graph_id
        in: path
        required: true
        schema:
          type: string
          title: Graph Id
      - name: node_id
        in: path
        required: true
        schema:
          type: string
          title: Node Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LineageNode'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/graphs/{graph_id}/edges:
    post:
      tags:
      - graphs
      summary: Add Edge
      operationId: add_edge_api_v1_graphs__graph_id__edges_post
      security:
      - APIKeyHeader: []
      parameters:
      - name: graph_id
        in: path
        required: true
        schema:
          type: string
          title: Graph Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LineageEdge'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
                title: Response Add Edge Api V1 Graphs  Graph Id  Edges Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - graphs
      summary: List Edges
      operationId: list_edges_api_v1_graphs__graph_id__edges_get
      security:
      - APIKeyHeader: []
      parameters:
      - name: graph_id
        in: path
        required: true
        schema:
          type: string
          title: Graph Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response List Edges Api V1 Graphs  Graph Id  Edges Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/graphs/{graph_id}/query/upstream/{node_id}:
    get:
      tags:
      - graphs
      summary: Query Upstream
      operationId: query_upstream_api_v1_graphs__graph_id__query_upstream__node_id__get
      security:
      - APIKeyHeader: []
      parameters:
      - name: graph_id
        in: path
        required: true
        schema:
          type: string
          title: Graph Id
      - name: node_id
        in: path
        required: true
        schema:
          type: string
          title: Node Id
      - name: hops
        in: query
        required: false
        schema:
          type: integer
          maximum: 50
          minimum: 1
          default: 3
          title: Hops
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Query Upstream Api V1 Graphs  Graph Id  Query Upstream  Node
                  Id  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/graphs/{graph_id}/query/downstream/{node_id}:
    get:
      tags:
      - graphs
      summary: Query Downstream
      operationId: query_downstream_api_v1_graphs__graph_id__query_downstream__node_id__get
      security:
      - APIKeyHeader: []
      parameters:
      - name: graph_id
        in: path
        required: true
        schema:
          type: string
          title: Graph Id
      - name: node_id
        in: path
        required: true
        schema:
          type: string
          title: Node Id
      - name: hops
        in: query
        required: false
        schema:
          type: integer
          maximum: 50
          minimum: 1
          default: 3
          title: Hops
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Query Downstream Api V1 Graphs  Graph Id  Query Downstream  Node
                  Id  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/tasks:
    get:
      tags:
      - tasks
      summary: List Tasks
      description: List recent tasks with optional filters.
      operationId: list_tasks_api_v1_tasks_get
      security:
      - APIKeyHeader: []
      parameters:
      - name: task_type
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/TaskType'
          - type: 'null'
          title: Task Type
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/TaskStatus'
          - type: 'null'
          title: Status
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 20
          title: Limit
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TaskInfo'
                title: Response List Tasks Api V1 Tasks Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/tasks/{task_id}:
    get:
      tags:
      - tasks
      summary: Get Task
      description: Get a specific task by ID.
      operationId: get_task_api_v1_tasks__task_id__get
      security:
      - APIKeyHeader: []
      parameters:
      - name: task_id
        in: path
        required: true
        schema:
          type: string
          title: Task Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskInfo'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/tasks/extract:
    post:
      tags:
      - tasks
      summary: Trigger Extraction
      description: 'Trigger an async lineage extraction from Confluent Cloud.


        Returns immediately with a task_id. Poll GET /tasks/{task_id} for progress.'
      operationId: trigger_extraction_api_v1_tasks_extract_post
      requestBody:
        content:
          application/json:
            schema:
              anyOf:
              - items:
                  type: string
                type: array
              - type: 'null'
              title: Environment Ids
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Trigger Extraction Api V1 Tasks Extract Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyHeader: []
  /api/v1/tasks/enrich:
    post:
      tags:
      - tasks
      summary: Trigger Enrichment
      description: 'Trigger catalog enrichment on an existing graph.


        Runs all registered catalog providers'' enrich() methods.

        Returns immediately with a task_id.'
      operationId: trigger_enrichment_api_v1_tasks_enrich_post
      security:
      - APIKeyHeader: []
      parameters:
      - name: graph_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Graph Id
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Trigger Enrichment Api V1 Tasks Enrich Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
